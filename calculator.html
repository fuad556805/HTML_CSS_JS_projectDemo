<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/calculator.css">
</head>
<body>

<div class="overlay" id="overlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <img src="images/logo.png" alt="StudyHub">
    <span class="sidebar-title">StudyHub</span>
    <button class="sidebar-close" id="sidebarClose">✕</button>
  </div>
  <nav class="sidebar-nav">
    <a href="index.html" class="sidebar-link"><span class="link-icon">🏠</span> Home</a>
    <a href="calculator.html" class="sidebar-link active"><span class="link-icon">🔢</span> Calculator</a>
    <a href="todo.html" class="sidebar-link"><span class="link-icon">✅</span> To-Do</a>
    <a href="notes.html" class="sidebar-link"><span class="link-icon">📝</span> Notes</a>
    <a href="stopwatch.html" class="sidebar-link"><span class="link-icon">⏱️</span> Stopwatch</a>
    <a href="clock.html" class="sidebar-link"><span class="link-icon">🕐</span> Clock</a>
    <a href="bmi.html" class="sidebar-link"><span class="link-icon">⚖️</span> BMI Calculator</a>
    <a href="converter.html" class="sidebar-link"><span class="link-icon">🔄</span> Converter</a>
    <a href="calendar.html" class="sidebar-link"><span class="link-icon">📅</span> Calendar</a>
    <a href="game.html" class="sidebar-link"><span class="link-icon">🎯</span> Guess Game</a>
    <a href="about.html" class="sidebar-link"><span class="link-icon">ℹ️</span> About</a>
    <a href="help.html" class="sidebar-link"><span class="link-icon">❓</span> Help</a>
  </nav>
  <div class="sidebar-footer">StudyHub &copy; 2025</div>
</aside>

<nav class="navbar">
  <div class="nav-container">
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <a href="index.html" class="nav-brand">
      <img src="images/logo.png" alt="StudyHub" class="nav-logo">
      <span class="brand-text">StudyHub</span>
    </a>
  </div>
</nav>

<main class="main">
  <div class="page-header">
    <h1>🔢 Calculator</h1>
    <p>Scientific calculator with history &amp; memory</p>
  </div>

  <div class="calc-layout">
    <div class="calc-card card">
      <div class="calc-display">
        <div class="calc-expr" id="calcExpr">&nbsp;</div>
        <div class="calc-result" id="calcResult">0</div>
      </div>
      <div class="calc-tabs">
        <button class="ctab active" data-mode="basic" onclick="setMode('basic',this)">Basic</button>
        <button class="ctab" data-mode="sci" onclick="setMode('sci',this)">Scientific</button>
      </div>
      <div class="sci-row" id="sciRow">
        <button onclick="calcSci('Math.sin')">sin</button>
        <button onclick="calcSci('Math.cos')">cos</button>
        <button onclick="calcSci('Math.tan')">tan</button>
        <button onclick="calcSci('Math.log10')">log</button>
        <button onclick="calcSci('Math.log')">ln</button>
        <button onclick="calcSci('Math.sqrt')">√</button>
        <button onclick="calcSci('Math.abs')">|x|</button>
        <button onclick="appendKey('**2')">x²</button>
        <button onclick="appendKey('**')">xⁿ</button>
        <button onclick="appendKey('Math.PI')">π</button>
        <button onclick="appendKey('Math.E')">e</button>
        <button onclick="calcSci('1/')">1/x</button>
      </div>
      <div class="calc-pad">
        <button class="fn-btn" onclick="clearMem()">MC</button>
        <button class="fn-btn" onclick="recallMem()">MR</button>
        <button class="fn-btn" onclick="storeMem()">M+</button>
        <button class="op-btn" onclick="clearAll()">AC</button>
        <button onclick="appendKey('7')">7</button>
        <button onclick="appendKey('8')">8</button>
        <button onclick="appendKey('9')">9</button>
        <button class="op-btn" onclick="appendKey('/')">÷</button>
        <button onclick="appendKey('4')">4</button>
        <button onclick="appendKey('5')">5</button>
        <button onclick="appendKey('6')">6</button>
        <button class="op-btn" onclick="appendKey('*')">×</button>
        <button onclick="appendKey('1')">1</button>
        <button onclick="appendKey('2')">2</button>
        <button onclick="appendKey('3')">3</button>
        <button class="op-btn" onclick="appendKey('-')">−</button>
        <button onclick="appendKey('0')" class="span2">0</button>
        <button onclick="appendKey('.')">.</button>
        <button class="op-btn" onclick="appendKey('+')">+</button>
        <button onclick="backspace()" class="fn-btn">⌫</button>
        <button onclick="appendKey('(')">(</button>
        <button onclick="appendKey(')')">)</button>
        <button class="eq-btn" onclick="calculate()">=</button>
      </div>
    </div>
    <div class="card history-panel">
      <div class="flex justify-between items-center mb-2">
        <h3 style="font-size:1rem;font-weight:700">📋 History</h3>
        <button class="btn btn-sm btn-outline" onclick="clearHistory()">Clear</button>
      </div>
      <div class="hist-list" id="histList"><p class="no-hist">No calculations yet.</p></div>
    </div>
  </div>
</main>

<footer><p>Made with <span>♥</span> by StudyHub &copy; 2025</p></footer>
<div class="toast-container" id="toastContainer"></div>
<script>
  (function() {
    var sb = document.getElementById('sidebar');
    var ov = document.getElementById('overlay');
    var hb = document.getElementById('hamburger');
    var sc = document.getElementById('sidebarClose');
    function openSB()  { sb.classList.add('open'); ov.classList.add('open'); }
    function closeSB() { sb.classList.remove('open'); ov.classList.remove('open'); }
    hb.addEventListener('click', function() { sb.classList.contains('open') ? closeSB() : openSB(); });
    sc.addEventListener('click', closeSB);
    ov.addEventListener('click', closeSB);
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeSB(); });
  })();
  function toast(msg, type) {
    var t = document.createElement('div');
    t.className = 'toast' + (type ? ' ' + type : '');
    t.textContent = msg;
    document.getElementById('toastContainer').appendChild(t);
    setTimeout(function() { t.remove(); }, 3000);
  }
</script>
<script src="js/calculator.js"></script>
</body>
</html>
